geomLayers:
  # --- Combined Geltungsbereich (both regions) ---
  - name: Geltungsbereich
    operations:
      - type: dissolve
        layers:
          - Geltungsbereich West
          - Geltungsbereich East
      - type: difference
        reverseDifference: false
        layers:
          - Exclude Zone

  # --- Test: hatch as layer property ---
  - name: Planning Area
    hatch:
      - style: baufeld
    operations:
      - type: copy
        layers:
          - Geltungsbereich
      - type: difference
        reverseDifference: false
        layers:
          - Forest Buffer

apply:
  # Template: baugrenze_chain (from templates/)
  - template: baugrenze_chain
    params:
      base_layer: Geltungsbereich
      baugrenze_inset: -3
      baugrenze_2_inset: -0.4
      report_dir: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/generated"

  # Template: zone_report for each region
  - template: zone_report
    params:
      zone_name: Geltungsbereich West
      parcel_layer: Parcels
      report_dir: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/generated"

  - template: zone_report
    params:
      zone_name: Geltungsbereich East
      parcel_layer: Parcels
      report_dir: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/generated"
