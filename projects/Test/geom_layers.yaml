geomLayers:
  # --- Inputs ---
  - name: Parcels
    shapeFile: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/parcels.shp"
    label: label

  - name: Forest
    shapeFile: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/forest.shp"
    operations:
      - type: dissolve

  - name: Biotope
    shapeFile: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/biotope.shp"

  - name: Utility Line
    shapeFile: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/utility_line.shp"

  - name: Exclude Zone
    shapeFile: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/exclude.shp"

  # --- Test: enabled: false ---
  - name: Disabled Layer
    enabled: false
    shapeFile: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/parcels.shp"
    operations:
      - type: buffer
        distance: 999

  # --- Test: buffer defaults (should use project-level round/round/32) ---
  - name: Forest Buffer
    operations:
      - type: buffer
        layers:
          - Forest
        distance: 10

  # --- Test: buffer override (should use mitre, not project default) ---
  - name: Utility Buffer
    operations:
      - type: buffer
        layers:
          - Utility Line
        distance: 5
        joinStyle: mitre
        capStyle: flat

  # --- Test: auto-repair opt-out on a difference ---
  - name: Raw Difference
    operations:
      - type: copy
        layers:
          - Parcels
      - type: difference
        reverseDifference: false
        autoRepair: false
        layers:
          - Forest

  # --- Test: style extends (testZone extends baugrenze, adds green color) ---
  - name: Test Zone Boundary
    style: testZone
    operations:
      - type: copy
        layers:
          - Parcels

# --- Project-local template definition + usage ---
templates:
  - name: buffer_variant
    params:
      - variant_name
      - source
      - dist
    layers:
      - name: "${variant_name}"
        operations:
          - type: buffer
            layers:
              - "${source}"
            distance: ${dist}

apply:
  # Cross-project templates
  - template: admin_boundaries
    params:
      flur_source: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/flur.shp"
      gemarkung_source: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/gemarkung.shp"
      gemeinde_source: "/home/g/dev/Gunther-Schulz/Python-ACAD-Tools/projects/Test/input/gemeinde.shp"

  - template: geltungsbereich
    params:
      name: West
      parcel_layer: Parcels
      parcels:
        - "1"
        - "3"
      flur: "Flur 1"
      gemarkung: "Testgemarkung"
      gemeinde: "Testgemeinde"

  - template: geltungsbereich
    params:
      name: East
      parcel_layer: Parcels
      parcels:
        - "2"
        - "4"
      flur: "Flur 2"
      gemarkung: "Testgemarkung"
      gemeinde: "Testgemeinde"

  # Project-local template
  - template: buffer_variant
    params:
      variant_name: Biotope Buffer 5m
      source: Biotope
      dist: 5

  - template: buffer_variant
    params:
      variant_name: Biotope Buffer 10m
      source: Biotope
      dist: 10
